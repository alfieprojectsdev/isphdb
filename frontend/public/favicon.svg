<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="22" fill="url(#bgGradient)"/>
  
  <rect width="90" height="90" x="5" y="5" rx="18" fill="none" stroke="#30363d" stroke-width="1.5"/>
  
  <circle cx="50" cy="50" r="28" stroke="#58a6ff" stroke-width="4" stroke-opacity="0.3" fill="none"/>
  <circle cx="50" cy="50" r="18" stroke="#58a6ff" stroke-width="4" stroke-opacity="0.6" fill="none"/>
  
  <circle cx="50" cy="50" r="8" fill="#3fb950" filter="url(#glow)"/>
</svg>
